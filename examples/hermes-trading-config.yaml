# DANGEROUS: use only with a server intentionally started with
# --dangerously-enable-trading. These values are sent as private HTTP headers and require HTTPS
# when the MCP server is remote.
mcp_servers:
  tossinvest:
    url: "http://127.0.0.1:8000/mcp"
    headers:
      X-Tossinvest-Client-Id: "${TOSSINVEST_CLIENT_ID}"
      X-Tossinvest-Client-Secret: "${TOSSINVEST_CLIENT_SECRET}"
      X-Tossinvest-Max-Order-Krw: "${TOSSINVEST_MAX_ORDER_KRW}"
      X-Tossinvest-Max-Order-Usd: "${TOSSINVEST_MAX_ORDER_USD}"
      X-Tossinvest-Approval-Token-Sha256: "${TOSSINVEST_APPROVAL_TOKEN_SHA256}"
    enabled: true
    timeout: 120
    connect_timeout: 30
    supports_parallel_tool_calls: false
    tools:
      include:
        - get_stock_info
        - get_stock_warnings
        - get_prices
        - get_orderbook
        - get_recent_trades
        - get_price_limits
        - get_candles
        - get_exchange_rate
        - get_market_calendar
        - list_accounts
        - get_holdings
        - list_orders
        - get_order
        - get_buying_power
        - get_sellable_quantity
        - get_commissions
        - preview_order
        - place_order
        - preview_order_modification
        - modify_order
        - preview_order_cancellation
        - cancel_order
      resources: false
      prompts: false
