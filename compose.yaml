services:
  tossinvest-mcp:
    build:
      context: .
    image: ghcr.io/cha2hyun/tossinvest-mcp:latest
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
      MCP_PUBLISHED_HOST: "${MCP_PUBLISHED_HOST:-127.0.0.1}"
      MCP_TENANT_CACHE_SIZE: "${MCP_TENANT_CACHE_SIZE:-100}"
      MCP_TENANT_CACHE_TTL: "${MCP_TENANT_CACHE_TTL:-3600}"
      MCP_TRUSTED_PROXY_IPS: "${MCP_TRUSTED_PROXY_IPS:-127.0.0.1}"
      MCP_ALLOWED_ORIGINS: "${MCP_ALLOWED_ORIGINS:-}"
      TOSSINVEST_APPROVAL_BASE_URL: "${TOSSINVEST_APPROVAL_BASE_URL:-http://127.0.0.1:8000}"
      TOSSINVEST_BASE_URL: "${TOSSINVEST_BASE_URL:-https://openapi.tossinvest.com}"
      TOSSINVEST_REQUEST_TIMEOUT: "${TOSSINVEST_REQUEST_TIMEOUT:-15}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    ports:
      - "${MCP_PUBLISHED_HOST:-127.0.0.1}:${MCP_PUBLISHED_PORT:-8000}:8000"
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    stop_grace_period: 15s
