name: OpenAPI drift

on:
  workflow_dispatch:
  schedule:
    - cron: "17 1 * * 1"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --frozen --all-extras
      - name: Compare with the official Toss OpenAPI schema
        run: uv run python scripts/update_openapi.py --check
